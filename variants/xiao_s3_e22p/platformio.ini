[Xiao_S3_E22P]
extends = esp32_base
board = seeed_xiao_esp32s3
board_check = true
board_build.mcu = esp32s3
build_flags = ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I variants/xiao_s3_e22p
  -UENV_INCLUDE_GPS
  -D SEEED_XIAO_S3
  -D P_LORA_DIO_1=2    ; D1
  -D P_LORA_RESET=3    ; D2
  -D P_LORA_BUSY=4     ; D3
  -D P_LORA_NSS=5      ; D4
  -D P_LORA_SCLK=7     ; D8
  -D P_LORA_MISO=8     ; D9
  -D P_LORA_MOSI=9     ; D10
  -D P_LORA_EN=6      ; D5 / SCL, E22P EN
  -D PIN_USER_BTN=-1
  -D PIN_STATUS_LED=21 ; Orange user LED, LOW=On
  -D PIN_BOARD_SDA=D6  ; D6=43
  -D PIN_BOARD_SCL=D7  ; D7=44
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_REGISTER_PATCH=1
  -D SX126X_AGC_RESET_SIMPLE_SLEEP=1
  -D E22P_AGC_RESET_INTERVAL_DEFAULT_SECS=4
  -D NOISE_FLOOR_SAMPLE_AFTER_AGC_ONLY=1
  -D WIFI_NTP_WATCHDOG=1
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D SX126X_RX_BOOSTED_GAIN=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/xiao_s3_e22p>
  +<helpers/sensors>
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}

[env:Xiao_S3_E22P_repeater]
extends = Xiao_S3_E22P
build_src_filter = ${Xiao_S3_E22P.build_src_filter}
  +<../examples/simple_repeater/*.cpp>
build_flags =
  ${Xiao_S3_E22P.build_flags}
  -D ADVERT_NAME='"MeshCore-E22P"'
  -D FIRMWARE_VERSION='"1.16.0-e22p.1"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D MAX_NEIGHBOURS=50
  -D WIFI_OTA_USE_WIFI_MANAGER=1
  -D WIFI_OTA_PERSISTENT_STA=1
  -D WIFI_OTA_HTTP_CLI=1
  -D WIFI_OTA_CONNECT_TIMEOUT=10
  -D WIFI_OTA_AP_WINDOW_SECS=600
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps =
  ${Xiao_S3_E22P.lib_deps}
  ${esp32_ota.lib_deps}
  tzapu/WiFiManager @ 2.0.17
